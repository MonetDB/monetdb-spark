name: make test

on:
    push:
        branches:
          - main
    pull_request:

jobs:

    make_test:
        runs-on: ubuntu-latest
        strategy:
          matrix:
            monetdbversion:
              - "monetdb/monetdb:Dec2025-SP1"
              - "monetdb/monetdb:Mar2025-SP3"
              - "monetdb/dev-builds:default"
        services:
            monetdb:
                image: "${{ matrix.monetdbversion }}"
                env:
                    MDB_CREATE_DBS: demo
                    MDB_DB_ADMIN_PASS: monetdb
                ports:
                    - 50000:50000
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                java-version: 17
                distribution: temurin
                cache: maven

            - run: make

            - run: make test TESTDB=jdbc:monetdb:///demo

